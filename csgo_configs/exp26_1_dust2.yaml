###################
### config.yaml
###################
debug: False


### model
is_multi_task: True
is_multi_task_balanced: True

# Exp26_1_dust2: exp26_dust2 + low-noise-only aux-loc.
# Only compute aux_loc_loss on low-noise generation timesteps; remove the old continuous 1-sigma weighting.
alpha_loc_loss: 2
alpha_loc_schedule_steps: [0, 10000, 18000, 28000]
alpha_loc_schedule_values: [2.0, 5.0, 10.0, 20.0]

is_loc_aux_loss: True
alpha_loc_aux_loss: 0.0
alpha_loc_aux_schedule_steps: [0, 6000]
alpha_loc_aux_schedule_values: [0.0, 2.0]

is_aux_loc_combined_em_unc_loss: True
aux_loc_combined_num_samples: 2
aux_loc_combined_candidate_tau: 1.0
aux_loc_combined_unc_metric: "residual_l1_normed"
aux_loc_combined_unc_tau: 1.0
aux_loc_combined_unc_min_weight: 0.05
aux_loc_combined_share_loc_noise: True
aux_loc_combined_unc_eps: 1.0e-6
aux_loc_timestep_weight_type: "low_noise_only"
aux_loc_low_noise_sigma_max: 0.45
aux_loc_timestep_weight_renorm: "active_mean"

is_repa_loss: False
is_gen_aux_loss: False

is_action_dit_dense_timestep: True
is_action_dit_projector: True
action_dit_projector_lr: 0.0005
action_dit_lr: 0.0001
is_aciton_dit_vae_small_init: False

use_pi05_action_dit: True
pi05_pytorch_weight_path: "/home/jiahao/.cache/openpi/openpi-assets/checkpoints/pi05_base"

use_external_loc_model: False

img_size: 224
use_short_instruction: True


### data
data_dir: "data/preprocessed_data"
train_maps: ['de_dust2']
val_maps: ['de_dust2']
test_maps: ['de_dust2']


### lora
is_lora: False
