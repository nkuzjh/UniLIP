###################
### config.yaml
###################
debug: False


### model
is_multi_task: True
is_multi_task_balanced: True

# Exp24_dust2: exp17_7_dust2@8000 warm-start + img_size=224 + short instruction
# + standard DINOv2 REPA + exp23 combined EM-responsibility and uncertainty-gated aux-loc
alpha_loc_loss: 2
alpha_loc_schedule_steps: [0, 10000, 18000, 28000]
alpha_loc_schedule_values: [2.0, 5.0, 10.0, 20.0]

is_loc_aux_loss: True
alpha_loc_aux_loss: 0.0
alpha_loc_aux_schedule_steps: [0, 3000, 4000, 5000, 10000]
alpha_loc_aux_schedule_values: [0.0, 1.0, 2.0, 5.0, 10.0]

is_aux_loc_combined_em_unc_loss: True
aux_loc_combined_num_samples: 2
aux_loc_combined_candidate_tau: 1.0
aux_loc_combined_unc_metric: "residual_l1_normed"
aux_loc_combined_unc_tau: 1.0
aux_loc_combined_unc_min_weight: 0.05
aux_loc_combined_share_loc_noise: True
aux_loc_combined_unc_eps: 1.0e-6

is_repa_loss: True
alpha_repa_loss: 0.5
repa_teacher_type: "dinov2"
repa_teacher_name_or_path: "facebook/dinov2-base"
repa_teacher_input_size: 224
repa_teacher_hidden_size: 768
repa_dit_layer_idx: 6
repa_align_type: "patch_wise"
repa_expected_num_patches: 256
repa_projector_type: "mlp3_silu"
repa_mlp_num_layers: 3
repa_mlp_activation: "silu"
repa_mlp_hidden_ratio: 1.0
repa_detach_condition: True

is_action_dit_dense_timestep: True
is_action_dit_projector: True
action_dit_projector_lr: 0.0005
action_dit_lr: 0.0001
is_aciton_dit_vae_small_init: False

use_pi05_action_dit: True
pi05_pytorch_weight_path: "/home/jiahao/.cache/openpi/openpi-assets/checkpoints/pi05_base"

use_external_loc_model: False

img_size: 224
use_short_instruction: True

resume_ckpt_path: "outputs/csgo_1b/exp17_7_dust2/checkpoint-8000/model.safetensors"


### data
data_dir: "data/preprocessed_data"
train_maps: ['de_dust2']
val_maps: ['de_dust2']
test_maps: ['de_dust2']


### lora
is_lora: False
