# config.yaml
debug: False


### model
is_multi_task: True
is_action_dit_dense_timestep: True
alpha_loc_loss: 1  # 当 is_multi_task_balanced==False and task_mix_ratio=0.0 时失效

is_loc_aux_loss: False  # 当 is_multi_task_balanced==False and task_mix_ratio=1.0时 失效

