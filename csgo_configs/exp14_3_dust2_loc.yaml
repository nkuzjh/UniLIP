###################
### exp14_3_dust2_loc
###################
debug: False

### model
is_multi_task: True
is_multi_task_balanced: False
task_mix_ratio: 1.0

# Exp14_3_dust2_loc: exp28_1_dust2 single-task loc ablation.
# Disable all loc/gen interaction losses and train only the localization head.
alpha_loc_loss: 1.0

is_loc_aux_loss: False
alpha_loc_aux_loss: 0.0
is_aux_loc_em_loss: False
is_aux_loc_uncertainty_loss: False
is_aux_loc_combined_em_unc_loss: False
is_gen_aux_loss: False
alpha_gen_aux_loss: 0.0
is_loc_perception_loss: False
alpha_loc_perception_loss: 0.0
is_loc_repa_loss: False
is_repa_loss: False
is_noisy_loc_loss: False

is_action_dit_dense_timestep: True
is_action_dit_projector: True
action_dit_projector_lr: 0.0005
action_dit_lr: 0.0001
is_aciton_dit_vae_small_init: False

use_pi05_action_dit: True
pi05_pytorch_weight_path: "/home/jiahao/.cache/openpi/openpi-assets/checkpoints/pi05_base"
use_external_loc_model: False

img_size: 224
use_short_instruction: True

### data
data_dir: "data/preprocessed_data"
train_maps: ['de_dust2']
val_maps: ['de_dust2']
test_maps: ['de_dust2']

### trainability
is_lora: False
llm_train_mode: "frozen"
fix_vit: True
fix_llm: True
fix_connect: True
fix_dit: True
freeze_gen_head: True
freeze_loc_head: False
