# config.yaml
debug: False


### model
is_multi_task: True
is_multi_task_balanced: False
task_mix_ratio: 0.0
alpha_loc_loss: 0.0

# Train generation only + external localization auxiliary loss
is_loc_aux_loss: True
alpha_loc_aux_loss: 10 #0.1

# Keep UniLIP internal localization modules fully disabled in this experiment
skip_internal_loc_modules: True
use_external_loc_model: True
external_loc_use_circular_loss: True
external_loc_input_size: 224

# csgosquare/baseline pure visual regression locator
external_loc_repo_root: "csgosquare"
external_loc_config_path: "configs_reg_newdata/exp5_2.yaml"
external_loc_checkpoint_path: "checkpoints_reg_newdata/exp5_2/20251227_091745/current_model.pth"

# UniLIP exp2 generation checkpoint (set this to your trained exp2 checkpoint)
resume_ckpt_path: "outputs/csgo_1b/exp2/checkpoint-46800/model.safetensors"


img_size: 448


### data
data_dir: "data/preprocessed_data"
train_maps: ['de_dust2', 'de_nuke', 'de_ancient']
val_maps: ['de_dust2', 'de_nuke', 'de_ancient']
test_maps: ['de_dust2', 'de_nuke', 'de_ancient']


is_lora: False



### infer
ckpt_path: "outputs/csgo_1b/exp16_3_resume_from_checkpoint-46800/checkpoint-4690/model.safetensors"
guidance_scale: 4.5
batch_size: 1
is_conti_gen: True

# 模仿训练时的 model_args
mllm_hf_path: "OpenGVLab/InternVL3-1B-hf"
# action_dit_layer: 24
action_dim: 5
