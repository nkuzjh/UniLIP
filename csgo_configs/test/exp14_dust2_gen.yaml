###################
### config.yaml
###################
debug: False


### model
is_multi_task: True
is_action_dit_dense_timestep: True
alpha_loc_loss: 1  # 当 is_multi_task_balanced==False and task_mix_ratio=0.0 时失效

is_loc_aux_loss: False  # 当 is_multi_task_balanced==False and task_mix_ratio=1.0 时失效

is_multi_task_balanced: False
task_mix_ratio: 0.0 # 当is_multi_task_balanced==True时失效

is_action_dit_projector: True
action_dit_projector_lr: 0.0005
action_dit_lr: 0.0001

is_aciton_dit_vae_small_init: False

use_pi05_action_dit: True
pi05_pytorch_weight_path: "/home/jiahao/.cache/openpi/openpi-assets/checkpoints/pi05_base"


img_size: 448


### data
data_dir: "data/preprocessed_data"
train_maps: ['de_dust2'] #, 'de_nuke', 'de_ancient']
val_maps: ['de_dust2'] #, 'de_nuke', 'de_ancient']
test_maps: ['de_dust2'] #, 'de_nuke', 'de_ancient']


### lora
is_lora: False


### infer
ckpt_path: "outputs/csgo_1b/exp14_dust2_gen/checkpoint-4000/model.safetensors"
guidance_scale: 4.5
batch_size: 1
# is_conti_gen: True

# 模仿训练时的 model_args
